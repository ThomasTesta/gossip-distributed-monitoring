services:
  node-1:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: node-1
    environment:
      NODE_ID: node-1
      BIND_HOST: 0.0.0.0
      BIND_PORT: 5001
      PEERS: node-1@node-1:5001,node-2@node-2:5002,node-3@node-3:5003
      GOSSIP_INTERVAL: 1.0
      FANOUT: 2
      LOG_LEVEL: INFO
    networks:
      - gossip-net

  node-2:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: node-2
    environment:
      NODE_ID: node-2
      BIND_HOST: 0.0.0.0
      BIND_PORT: 5002
      PEERS: node-1@node-1:5001,node-2@node-2:5002,node-3@node-3:5003
      GOSSIP_INTERVAL: 1.0
      FANOUT: 2
      LOG_LEVEL: INFO
    networks:
      - gossip-net

  node-3:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: node-3
    environment:
      NODE_ID: node-3
      BIND_HOST: 0.0.0.0
      BIND_PORT: 5003
      PEERS: node-1@node-1:5001,node-2@node-2:5002,node-3@node-3:5003
      GOSSIP_INTERVAL: 1.0
      FANOUT: 2
      LOG_LEVEL: INFO
    networks:
      - gossip-net

networks:
  gossip-net:
    driver: bridge