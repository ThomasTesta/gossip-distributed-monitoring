services:

  node-1:
    build: .
    container_name: node-1
    environment:
      NODE_ID: node-1
      BIND_HOST: 0.0.0.0
      BIND_PORT: 5001
      PEERS: node-1@node-1:5001,node-2@node-2:5002,node-3@node-3:5003,node-4@node-4:5004,node-5@node-5:5005
      GOSSIP_INTERVAL: 1.0
      FANOUT: 3
      LOG_LEVEL: INFO

      # Fault Injection
      NET_DROP_RATE: 0.0
      NET_DELAY_MIN_MS: 0
      NET_DELAY_MAX_MS: 0

      #Gossip Arena test 1
      STARTUP_RUMORS: rumor-001,rumor-002,rumor-003

    networks:
      - gossip-net


  node-2:
